name: Bug report
description: Report something that is broken
body:
  - type: markdown
    attributes:
      value: |
        <!-- vv-form:bug -->
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Core version (for example 2025.4.1)
    validations:
      required: true
  - type: input
    id: ha_vv_version
    attributes:
      label: VoucherVault integration version
      description: >
        This Home Assistant custom integration (manifest or HACS), not the
        official VoucherVault product
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
